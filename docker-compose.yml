services:
  noodle:
    build: .
    container_name: noodle
    ports:
      - "8090:8090"
    volumes:
      - ./projects:/app/projects
      - ./feedback:/app/feedback
      - ./cad_nodes:/app/cad_nodes:ro
      - ./webui:/app/webui:ro
      - ./server.py:/app/server.py:ro
      - ./mcp_server.py:/app/mcp_server.py:ro
    # let the container reach a host-run Ollama (default copilot backend) at
    # host.docker.internal — Linux needs the explicit host-gateway mapping.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Copilot LLM backend. Default: local Ollama on the host (free).
      # For a keyed OpenAI-compatible provider instead, set COPILOT_BASE_URL +
      # COPILOT_API_KEY + COPILOT_MODEL (e.g. Groq / OpenRouter / Gemini).
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - COPILOT_MODEL=${COPILOT_MODEL:-qwen2.5}
      - COPILOT_BASE_URL=${COPILOT_BASE_URL:-}
      - COPILOT_API_KEY=${COPILOT_API_KEY:-}
      - COPILOT_MAX_STEPS=${COPILOT_MAX_STEPS:-24}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
