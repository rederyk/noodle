<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>noodle · file library</title>
<link rel="icon" href="/static/icon.svg">
<style>
  :root{
    --bg-0:#0b0e14; --bg-1:#0f1318; --bg-2:#151a22; --bg-3:#1a2030;
    --border:#1e2738; --text:#c5cdd8; --text-dim:#5c6a7a;
    --accent:#e94560; --accent-hover:#ff6b81; --green:#2dd4a0; --blue:#3b82f6;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --mono:'SFMono-Regular',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font);background:var(--bg-0);color:var(--text);
    min-height:100vh;font-size:14px;line-height:1.4;}
  a{color:inherit;text-decoration:none;}
  header{display:flex;align-items:center;gap:16px;padding:18px 24px;border-bottom:1px solid var(--border);
    position:sticky;top:0;background:var(--bg-0);z-index:5;}
  header .brand{display:flex;align-items:baseline;gap:10px;}
  header h1{margin:0;font-size:22px;letter-spacing:-.5px;}
  header .sub{color:var(--text-dim);font-size:13px;}
  header .spacer{flex:1;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;
    border:1px solid var(--border);background:var(--bg-3);color:var(--text);font-size:13px;
    cursor:pointer;transition:all .15s;font-weight:500;}
  .btn:hover{border-color:var(--text-dim);background:var(--bg-2);}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .btn.primary:hover{background:var(--accent-hover);}
  main{max-width:1100px;margin:0 auto;padding:24px;}
  /* upload */
  .uploader{display:flex;gap:14px;align-items:center;flex-wrap:wrap;
    border:1px dashed var(--border);border-radius:12px;padding:18px 20px;background:var(--bg-1);
    margin-bottom:28px;transition:all .15s;}
  .uploader.drag{border-color:var(--accent);background:var(--bg-2);}
  .uploader .u-txt{flex:1;min-width:220px;}
  .uploader .u-txt .t{font-weight:600;font-size:14px;}
  .uploader .u-txt .d{color:var(--text-dim);font-size:12px;margin-top:3px;line-height:1.5;}
  select{background:var(--bg-3);color:var(--text);border:1px solid var(--border);border-radius:8px;
    padding:8px 10px;font-size:13px;font-family:var(--font);cursor:pointer;}
  /* project blocks */
  .proj{margin-bottom:26px;}
  .proj-head{display:flex;align-items:baseline;gap:10px;margin:0 0 12px;padding-bottom:8px;
    border-bottom:1px solid var(--border);}
  .proj-head h2{margin:0;font-size:16px;font-weight:600;}
  .proj-head .count{color:var(--text-dim);font-size:12px;}
  .proj-head a.open{margin-left:auto;font-size:12px;color:var(--text-dim);}
  .proj-head a.open:hover{color:var(--text);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;}
  .file{display:flex;flex-direction:column;gap:8px;border:1px solid var(--border);border-radius:10px;
    padding:14px;background:var(--bg-1);transition:all .15s;}
  .file:hover{border-color:var(--text-dim);background:var(--bg-2);}
  .file .top{display:flex;align-items:center;gap:9px;}
  .badge{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.04em;
    padding:3px 6px;border-radius:5px;text-transform:uppercase;flex-shrink:0;}
  .badge.export{background:rgba(45,212,160,.14);color:var(--green);}
  .badge.asset{background:rgba(59,130,246,.16);color:#6ba4ff;}
  .file .fname{font-size:13px;font-weight:600;word-break:break-all;line-height:1.3;}
  .file .fmeta{font-size:11px;color:var(--text-dim);font-family:var(--mono);}
  .file .acts{display:flex;gap:8px;margin-top:2px;}
  .file .acts a,.file .acts button{flex:1;text-align:center;padding:6px 8px;border-radius:7px;
    font-size:12px;border:1px solid var(--border);background:var(--bg-3);color:var(--text);
    cursor:pointer;font-family:var(--font);transition:all .15s;}
  .file .acts a:hover{border-color:var(--green);color:var(--green);}
  .file .acts button.del{flex:0 0 auto;width:34px;color:var(--text-dim);}
  .file .acts button.del:hover{border-color:var(--accent);color:var(--accent);}
  .empty{color:var(--text-dim);font-size:14px;padding:40px 0;text-align:center;}
  .empty.sub{padding:6px 0;font-size:12px;text-align:left;}
  /* toast */
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:50;
    display:flex;flex-direction:column;gap:8px;align-items:center;}
  .tmsg{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:10px 16px;
    font-size:13px;box-shadow:0 6px 24px rgba(0,0,0,.4);animation:pop .2s ease;}
  .tmsg.success{border-color:var(--green);} .tmsg.error{border-color:var(--accent);}
  .tmsg code{font-family:var(--mono);color:var(--accent-hover);}
  @keyframes pop{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
  <header>
    <div class="brand"><h1>Library</h1><span class="sub">exported models &amp; imported assets, all projects</span></div>
    <div class="spacer"></div>
    <a class="btn" href="/nodes">← Node editor</a>
    <button class="btn" onclick="load()">⟳ Refresh</button>
  </header>

  <main>
    <div class="uploader" id="drop">
      <div class="u-txt">
        <div class="t">⬆ Upload a model into a project's assets</div>
        <div class="d">Drag &amp; drop or browse — STEP, STL, SVG, DXF. Uploaded files
          become importable assets you can wire into an Import node.</div>
      </div>
      <select id="proj-sel" title="Destination project"></select>
      <button class="btn primary" onclick="pickFile()">Choose file…</button>
      <input type="file" id="file-inp" accept=".step,.stp,.stl,.svg,.dxf" style="display:none">
    </div>

    <div id="list"><div class="empty">Loading…</div></div>
  </main>

  <div id="toast"></div>

<script>
const API = '';
let PROJECTS = [];

function fmtSize(b){
  if(b < 1024) return b + ' B';
  if(b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/(1024*1024)).toFixed(1) + ' MB';
}
function fmtDate(ts){
  try{ return new Date(ts*1000).toLocaleString(); }catch(_){ return ''; }
}
function toast(html, kind){
  const t = document.createElement('div');
  t.className = 'tmsg' + (kind ? ' '+kind : '');
  t.innerHTML = html;
  document.getElementById('toast').appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 3200);
}
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function load(){
  let data;
  try{
    const r = await fetch(`${API}/api/library`, {cache:'no-store'});
    data = await r.json();
  }catch(e){
    document.getElementById('list').innerHTML = `<div class="empty">Could not reach the server.</div>`;
    return;
  }
  PROJECTS = (data.projects || []);
  // populate the destination-project selector
  const sel = document.getElementById('proj-sel');
  const prev = sel.value;
  sel.innerHTML = PROJECTS.map(p => `<option value="${esc(p.project)}">${esc(p.project)}</option>`).join('')
    || '<option value="" disabled>No projects yet</option>';
  if(prev && PROJECTS.some(p=>p.project===prev)) sel.value = prev;

  const withFiles = PROJECTS.filter(p => p.files.length);
  const total = PROJECTS.reduce((n,p)=>n+p.files.length, 0);
  const el = document.getElementById('list');
  if(!total){
    el.innerHTML = `<div class="empty">No files yet.<br>
      Add an <b>Export</b> node to a graph (it writes into the project's
      <code>exports/</code> folder), or upload an asset above.</div>`;
    return;
  }
  el.innerHTML = withFiles.map(renderProject).join('');
}

function renderProject(p){
  const cards = p.files.map(f => {
    const badge = f.kind === 'exports' ? 'export' : 'asset';
    const label = f.kind === 'exports' ? 'export' : 'asset';
    return `<div class="file">
      <div class="top">
        <span class="badge ${badge}">${label}</span>
        <span class="fname">${esc(f.name)}</span>
      </div>
      <div class="fmeta">${fmtSize(f.size)} · ${fmtDate(f.mtime)}</div>
      <div class="acts">
        <a href="${esc(f.url)}" download="${esc(f.name)}" title="Download">⬇ Download</a>
        <button class="del" title="Delete" onclick="delFile('${esc(p.project)}','${esc(f.kind)}','${esc(f.name)}')">✕</button>
      </div>
    </div>`;
  }).join('');
  const ne = p.files.filter(f=>f.kind==='exports').length;
  const na = p.files.filter(f=>f.kind==='assets').length;
  return `<section class="proj">
    <div class="proj-head">
      <h2>${esc(p.project)}</h2>
      <span class="count">${ne} export${ne!==1?'s':''} · ${na} asset${na!==1?'s':''}</span>
      <a class="open" href="/nodes?p=${encodeURIComponent(p.project)}">open in editor →</a>
    </div>
    <div class="grid">${cards}</div>
  </section>`;
}

async function delFile(project, kind, name){
  if(!confirm(`Delete ${name} from ${project}/${kind}?`)) return;
  try{
    const r = await fetch(`${API}/api/library/${encodeURIComponent(project)}/${kind}/${encodeURIComponent(name)}`, {method:'DELETE'});
    if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.statusText);
    toast(`Deleted <code>${esc(name)}</code>.`, 'success');
    load();
  }catch(e){ toast('Delete failed: '+esc(e.message||e), 'error'); }
}
window.delFile = delFile;

/* ---- upload ---- */
function pickFile(){ document.getElementById('file-inp').click(); }
document.getElementById('file-inp').addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  if(f) uploadTo(f);
  e.target.value = '';
});
async function uploadTo(file){
  const project = document.getElementById('proj-sel').value;
  if(!project){ toast('Create a project first (in the node editor).', 'error'); return; }
  const fd = new FormData(); fd.append('file', file);
  try{
    const r = await fetch(`${API}/api/graph/${encodeURIComponent(project)}/asset`, {method:'POST', body:fd});
    if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.statusText);
    const d = await r.json();
    toast(`Uploaded <code>${esc(d.name)}</code> → ${esc(project)}.`, 'success');
    load();
  }catch(e){ toast('Upload failed: '+esc(e.message||e), 'error'); }
}
// drag & drop onto the uploader
const drop = document.getElementById('drop');
['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.add('drag');
}));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); if(ev==='dragleave' && drop.contains(e.relatedTarget)) return;
  drop.classList.remove('drag');
}));
drop.addEventListener('drop', e => {
  const f = e.dataTransfer.files && e.dataTransfer.files[0];
  if(f) uploadTo(f);
});

load();
</script>
</body>
</html>
