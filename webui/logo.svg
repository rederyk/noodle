<svg width="320" height="120" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5dffb0"/>
      <stop offset="1" stop-color="#2dd4a0"/>
    </linearGradient>
    <linearGradient id="left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f8f6e"/>
      <stop offset="1" stop-color="#136047"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#28b487"/>
      <stop offset="1" stop-color="#17795a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- node-canvas dot grid -->
  <g fill="#1e2738">
    <circle cx="20" cy="20" r="1.3"/><circle cx="44" cy="20" r="1.3"/><circle cx="68" cy="20" r="1.3"/>
    <circle cx="20" cy="44" r="1.3"/><circle cx="20" cy="68" r="1.3"/><circle cx="20" cy="92" r="1.3"/>
    <circle cx="44" cy="92" r="1.3"/><circle cx="68" cy="100" r="1.3"/>
  </g>

  <!-- the iso "solid" the graph builds -->
  <g filter="url(#glow)">
    <path d="M60 38 L92 56 L60 74 L28 56 Z" fill="url(#top)"/>
    <path d="M28 56 L60 74 L60 110 L28 92 Z" fill="url(#left)"/>
    <path d="M92 56 L60 74 L60 110 L92 92 Z" fill="url(#right)"/>
    <path d="M60 38 L92 56 L60 74 L28 56 Z M28 56 L60 74 L60 110 M92 56 L60 74"
          stroke="#9affc9" stroke-width="1" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- the "noodle": a wire from a node socket, weaving into the solid -->
  <path d="M14 84 C 40 84, 30 30, 60 38" stroke="#e94560" stroke-width="3"
        stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="14" cy="84" r="4.5" fill="#0b0e14" stroke="#e94560" stroke-width="2.5"/>
  <circle cx="60" cy="38" r="3" fill="#ff6b81"/>

  <!-- wordmark -->
  <text x="116" y="62" font-family="'JetBrains Mono','Fira Code',monospace" font-size="34"
        font-weight="700" fill="#e7edf5" letter-spacing="-1">noodle</text>
  <text x="118" y="82" font-family="'JetBrains Mono',monospace" font-size="10.5"
        fill="#39ff14" letter-spacing="3">NODES → SOLID</text>
  <rect x="278" y="50" width="9" height="18" fill="#39ff14">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
